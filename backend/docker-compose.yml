version: '3.8'

services:
  # Production Backend Service - Fully Optimized for Dedicated VM
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: language-limousine-backend:latest
    container_name: language-limousine-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Maximize Node.js memory usage for your VM (8GB heap)
      - NODE_OPTIONS=--max-old-space-size=8192 --max-semi-space-size=128
      # Enable Node.js performance optimizations
      - UV_THREADPOOL_SIZE=32
    env_file:
      - .env
    volumes:
      # Persist uploads
      - ./uploads:/app/uploads
      # Persist logs
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Maximize resource utilization for dedicated VM
    deploy:
      resources:
        limits:
          cpus: '32'       # Use 32 CPUs out of 38 threads (leave some for system)
          memory: 10G      # Allocate 10GB out of 11.7GB (leave ~1.7GB for system)
        reservations:
          cpus: '16'       # Reserve 16 CPUs minimum
          memory: 8G       # Reserve 8GB minimum
    # Security options
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem (except for volumes)
    read_only: true
    tmpfs:
      - /tmp:size=2G,mode=1777
      - /app/logs:size=1G,mode=0755

  # Optional: MongoDB service fully optimized for your VM
  # Uncomment if you want to run MongoDB on the same VM
  # mongodb:
  #   image: mongo:6-jammy
  #   container_name: language-limousine-mongodb
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=admin
  #     - MONGO_INITDB_ROOT_PASSWORD=password
  #     - MONGO_INITDB_DATABASE=language_limousine
  #   volumes:
  #     - mongodb-data:/data/db
  #     - mongodb-config:/data/configdb
  #   restart: unless-stopped
  #   networks:
  #     - backend-network
  #   # Optimized MongoDB settings for high performance
  #   command: >
  #     mongod
  #     --wiredTigerCacheSizeGB 6
  #     --maxConns 1000
  #     --wiredTigerConcurrentReadTransactions 256
  #     --wiredTigerConcurrentWriteTransactions 256
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '16'
  #         memory: 8G
  #       reservations:
  #         cpus: '8'
  #         memory: 6G
  #   healthcheck:
  #     test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
  #     interval: 10s
  #     timeout: 10s
